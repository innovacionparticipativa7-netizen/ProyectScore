<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Proyectos</title>

<!-- FIREBASE COMPAT -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
  font-family: Arial;
  background: #f4f6f8;
}

/* ===== ADMIN ===== */
.admin-wrapper { padding:20px; }
.admin-header {
  background:#fff; padding:15px; border-radius:10px;
  display:flex; justify-content:space-between;
}

.lista-proyectos li {
  padding:8px; cursor:pointer;
}
.lista-proyectos li:hover {
  background:#eee;
}

/* ===== USER ===== */
.user-wrapper {
  display:flex;
  justify-content:center;
  margin-top:20px;
}

.card {
  width:320px;
  background:#fff;
  padding:15px;
  border-radius:10px;
}

.luz {
  width:25px;
  height:25px;
  border-radius:50%;
  background:gray;
  margin:auto;
}

.resumen-semaforos {
  display:flex;
  justify-content:space-around;
  margin-bottom:10px;
}

.btn {
  width:100%;
  padding:10px;
  background:#4caf50;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
  .semaforo-opciones {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.opcion {
  width: 25px;
  height: 25px;
  border-radius: 50%;
  opacity: 0.4;
  cursor: pointer;
  border: 2px solid #ccc;
  transition: 0.2s;
}

.opcion:hover {
  transform: scale(1.2);
}

.opcion.activa {
  opacity: 1;
  border: 2px solid #000;
}

.verde { background: green; }
.amarillo { background: orange; }
.rojo { background: red; }

/* Tarjeta gráfica */
.card-grafica {
  background: #fff;
  border-radius: 10px;
  padding: 15px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.05);
  flex: 1 1 350px;
  max-width: 700px;

  /* 🔒 limites de altura para que la gráfica no se desborde */
  display: flex;
  flex-direction: column;
  height: 400px;
}
#grafica {
  flex: 1; /* ocupa todo el espacio disponible de la tarjeta */
}

  .lista-proyectos li.activo { background: #d0f0d0; }
  .admin-wrapper { padding: 20px; }
.admin-header {
  display: flex; justify-content: space-between; align-items: center;
  background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 20px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.admin-content {
  display: flex; flex-wrap: wrap; gap: 20px;
}

.card {
  background: #fff; border-radius: 10px; padding: 15px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.05);
  flex: 1 1 350px; /* se adapta a la pantalla */
  max-width: 700px;
}

#listaProyectos {
  list-style: none; padding: 0; margin-top: 10px;
  max-height: 300px; overflow-y: auto;
}

#listaProyectos li {
  padding: 8px; cursor: pointer; display: flex; justify-content: space-between;
  border-bottom: 1px solid #eee;
}

#listaProyectos li:hover { background: #f0f0f0; }
#listaProyectos li.activo { background: #d0f0d0; }

#grafica { width: 100%; height: 300px; } /* alto fijo, no se sale */
</style>
</head>

<body>
  
<!-- ADMIN -->
<div id="vista-admin" class="admin-wrapper">
  <div class="admin-header">
    <h2>Admin</h2>
    <span id="rol"></span>
    <button onclick="logout()">Salir</button>
  </div>

  <div class="admin-content">
    <!-- Tarjeta lista de proyectos -->
    <div class="card">
      <h3>Proyectos</h3>
      <input id="nombreProyecto" placeholder="Nuevo proyecto">
      <button onclick="crearProyecto()">Crear</button>
      <ul id="listaProyectos"></ul>
    </div>

    <!-- Tarjeta gráfica -->
    <div class="card card-grafica">
    <h3>Progreso semanal</h3>
    <canvas id="grafica"></canvas>
    </div>
  </div>
</div>

<!-- USER -->
<div id="vista-user" style="display:none;">
  <div class="user-wrapper">
    <div class="card">

      <h3 id="userNombreProyecto">Proyecto</h3>

      <div class="resumen-semaforos">
        <div>
          PSR
          <div class="luz" id="sem-psr"></div>
        </div>
        <div>
          KPI
          <div class="luz" id="sem-kpi"></div>
        </div>
        <div>
          GANTT
          <div class="luz" id="sem-plan"></div>
        </div>
      </div>

      <select id="selectProyectoUser"></select>

      <div>
  <p>PSR</p>
  <div class="semaforo-opciones">
    <div class="opcion verde" onclick="setValor('psr','bueno')"></div>
    <div class="opcion amarillo" onclick="setValor('psr','medio')"></div>
    <div class="opcion rojo" onclick="setValor('psr','malo')"></div>
  </div>

  <p>KPI</p>
  <div class="semaforo-opciones">
    <div class="opcion verde" onclick="setValor('kpi','bueno')"></div>
    <div class="opcion amarillo" onclick="setValor('kpi','medio')"></div>
    <div class="opcion rojo" onclick="setValor('kpi','malo')"></div>
  </div>

  <p>GANTT</p>
  <div class="semaforo-opciones">
    <div class="opcion verde" onclick="setValor('gantt','bueno')"></div>
    <div class="opcion amarillo" onclick="setValor('gantt','medio')"></div>
    <div class="opcion rojo" onclick="setValor('gantt','malo')"></div>
  </div>
</div>

      <button class="btn" onclick="guardar()">Guardar</button>

    </div>
  </div>
</div>

<script>

/* ===== FIREBASE ===== */
firebase.initializeApp({
  apiKey: "AIzaSyAoVH8wQ2ofolAaJYdFnu1COcwI-xvaNnM",
  authDomain: "panel-proyectos-f119f.firebaseapp.com",
  projectId: "panel-proyectos-f119f"
});
const vistaAdmin = document.getElementById("vista-admin");
const vistaUser = document.getElementById("vista-user");
const db = firebase.firestore();
const auth = firebase.auth();


/* ===== VARIABLES ===== */
let ROL = localStorage.getItem("rol");
let UID = localStorage.getItem("uid");
let chart = null;  // variable global para la gráfica
let proyectoId = null;
let proyecto = null;

/* ===== VALIDACIÓN LOGIN ===== */
if (!UID || !ROL) {
  alert("No autorizado");
  window.location.href = "login.html";
}
if (!UID || !ROL) {
  localStorage.clear();
  window.location.href = "login.html";
}
function aplicarRol() {
  if (!vistaAdmin || !vistaUser) return; // 🔒 evita error si no existen
  if (ROL === "admin") {
    vistaAdmin.style.display = "block";
    vistaUser.style.display = "none";
  } else {
    vistaAdmin.style.display = "none";
    vistaUser.style.display = "block";
  }
}

/* ===== CREAR ===== */
async function crearProyecto() {

  const nombre = nombreProyecto.value.trim();

  if (!nombre) return alert("Escribe nombre");

  await db.collection("proyectos").add({
  nombre,
  evaluacion: { psr:"medio", kpi:"medio", gantt:"medio" }
});

// 🔄 refrescar lista
cargarProyectos();
cargarSelect();

}
/* ===== LISTA ADMIN ===== */
async function cargarProyectos() {
  const snap = await db.collection("proyectos").get();
  listaProyectos.innerHTML = "";

  snap.forEach(doc => {
    const li = document.createElement("li");
    li.textContent = doc.data().nombre;

    li.onclick = () => {
  proyectoId = doc.id;
  proyecto = doc.data();
  document.querySelectorAll("#listaProyectos li").forEach(el => el.classList.remove("activo"));
  li.classList.add("activo");
  alert("Proyecto seleccionado: " + proyecto.nombre);
}

const btn = document.createElement("button");
btn.textContent = "Eliminar";
btn.onclick = async (e) => {
  e.stopPropagation();
  if (confirm("Eliminar este proyecto?")) {
    await db.collection("proyectos").doc(doc.id).delete();
    if(proyectoId===doc.id) proyectoId=null;
    cargarProyectos();
    cargarGrafica();
  }
}
    li.appendChild(btn);
    listaProyectos.appendChild(li);
  });
}

/* ===== SELECT USER ===== */
async function cargarSelect() {

  const snap = await db.collection("proyectos").get();

  selectProyectoUser.innerHTML = "";

  snap.forEach(doc => {

    const op = document.createElement("option");
    op.value = doc.id;
    op.textContent = doc.data().nombre;

    selectProyectoUser.appendChild(op);

  });

  if (selectProyectoUser.value) {
    cargarProyecto(selectProyectoUser.value);
  }

}

/* ===== CARGAR PROYECTO ===== */
async function cargarProyecto(id) {

  proyectoId = id;

  const snap = await db.collection("proyectos").doc(id).get();

  if (!snap.exists) return;

  proyecto = snap.data();

  userNombreProyecto.textContent = proyecto.nombre;

  renderSemaforos();

  // 🔥 SOLO después de cargar
  actualizarUI("psr", proyecto.evaluacion.psr);
  actualizarUI("kpi", proyecto.evaluacion.kpi);
  actualizarUI("gantt", proyecto.evaluacion.gantt);
}

/* ===== CAMBIAR ===== */
function cambiarEvaluacion(tipo, valor) {

  proyecto.evaluacion[tipo] = valor;

  renderSemaforos();

}

/* ===== SEMAFOROS ===== */
function renderSemaforos() {

  if (!proyecto || !proyecto.evaluacion) return; // 🔥 clave

  document.getElementById("sem-psr").style.background = color(proyecto.evaluacion.psr);
  document.getElementById("sem-kpi").style.background = color(proyecto.evaluacion.kpi);
  document.getElementById("sem-plan").style.background = color(proyecto.evaluacion.gantt);

}

function color(v) {
  if (v==="bueno") return "green";
  if (v==="medio") return "orange";
  return "red";
}

/* ===== GUARDAR ===== */
async function guardar() {

  const before = await db.collection("proyectos").doc(proyectoId).get();
  const oldData = before.data();

  await db.collection("proyectos").doc(proyectoId).update({
    evaluacion: proyecto.evaluacion
  });

  // 🔥 HISTORIAL
  await db.collection("historial").add({
    proyectoId,
    proyectoNombre: proyecto.nombre,
    usuario: UID,
    fecha: new Date(),
    antes: oldData.evaluacion,
    despues: proyecto.evaluacion
  });

  alert("Guardado ✅");
}
  
async function cargarGrafica() {
  const snap = await db.collection("historial").orderBy("fecha").get();
  const semanas = {};

  snap.forEach(doc => {
    const d = doc.data();
    const f = d.fecha.toDate();
    const semana = f.getFullYear() + "-W" + Math.ceil(f.getDate()/7);
    if (!semanas[semana]) semanas[semana] = [];
    semanas[semana].push(promedioEvaluacion(d.despues));
  });

  const labels = Object.keys(semanas).sort();
  const data = labels.map(sem => {
    const arr = semanas[sem];
    if (!arr.length) return 0;
    return arr.reduce((a,b)=>a+b,0)/arr.length;
  });

  const ctx = document.getElementById("grafica").getContext("2d");
if(chart) chart.destroy(); // destruye la anterior
chart = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets:[{ label:"Promedio semanal", data, backgroundColor:"rgba(75,192,192,0.7)" }] },
    options: {
        responsive: true,
        maintainAspectRatio: false, // 🔑 deja que se ajuste al contenedor
        plugins: { legend: { position: 'top' } },
        scales: { y: { beginAtZero:true, max:100 } }
    }
});
}

function promedioEvaluacion(ev) {
  const map = { bueno: 100, medio: 60, malo: 20 };
  return (map[ev.psr] + map[ev.kpi] + map[ev.gantt]) / 3;
}
/* ===== SELECT CHANGE ===== */
selectProyectoUser.onchange = () => {
  cargarProyecto(selectProyectoUser.value);
};


  function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}
function setValor(tipo, valor) {

  if (!proyecto) return; // 🛑 evita error

  proyecto.evaluacion[tipo] = valor;

  renderSemaforos();
  actualizarUI(tipo, valor);
}
function actualizarUI(tipo, valor) {

  const cont = document.querySelector(`.semaforo-opciones[data-tipo="${tipo}"]`);
  if (!cont) return;

  cont.querySelectorAll(".opcion").forEach(o => {
    o.classList.remove("activa");
  });

  if (valor === "bueno") cont.children[0].classList.add("activa");
  if (valor === "medio") cont.children[1].classList.add("activa");
  if (valor === "malo") cont.children[2].classList.add("activa");
}















  






  
aplicarRol();
cargarProyectos();
cargarSelect();
cargarGrafica();
</script>

</body>
</html>
