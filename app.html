<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Proyectos</title>

<!-- FIREBASE COMPAT -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body {
  font-family: Arial;
  background: #f4f6f8;
}

/* ===== ADMIN ===== */
.admin-wrapper { padding:20px; }
.admin-header {
  background:#fff; padding:15px; border-radius:10px;
  display:flex; justify-content:space-between;
}

.lista-proyectos li {
  padding:8px; cursor:pointer;
}
.lista-proyectos li:hover {
  background:#eee;
}

/* ===== USER ===== */
.user-wrapper {
  display:flex;
  justify-content:center;
  margin-top:20px;
}

.card {
  width:320px;
  background:#fff;
  padding:15px;
  border-radius:10px;
}

.luz {
  width:25px;
  height:25px;
  border-radius:50%;
  background:gray;
  margin:auto;
}

.resumen-semaforos {
  display:flex;
  justify-content:space-around;
  margin-bottom:10px;
}

.btn {
  width:100%;
  padding:10px;
  background:#4caf50;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
  .semaforo-opciones {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.opcion {
  width: 25px;
  height: 25px;
  border-radius: 50%;
  opacity: 0.4;
  cursor: pointer;
  border: 2px solid #ccc;
  transition: 0.2s;
}

.opcion:hover {
  transform: scale(1.2);
}

.opcion.activa {
  opacity: 1;
  border: 2px solid #000;
}

.verde { background: green; }
.amarillo { background: orange; }
.rojo { background: red; }
.gris { background: gray; }

/* Tarjeta gráfica */
.card-grafica {
  background: #fff;
  border-radius: 10px;
  padding: 15px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.05);
  flex: 1 1 350px;
  max-width: 700px;

  /* 🔒 limites de altura para que la gráfica no se desborde */
  display: flex;
  flex-direction: column;
  height: 400px;
}
#grafica {
  flex: 1; /* ocupa todo el espacio disponible de la tarjeta */
}

  .lista-proyectos li.activo { background: #d0f0d0; }
  .admin-wrapper { padding: 20px; }
.admin-header {
  display: flex; justify-content: space-between; align-items: center;
  background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 20px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.admin-content {
  display: flex; flex-wrap: wrap; gap: 20px;
}

.card {
  background: #fff; border-radius: 10px; padding: 15px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.05);
  flex: 1 1 350px; /* se adapta a la pantalla */
  max-width: 700px;
}

#listaProyectos {
  list-style: none; padding: 0; margin-top: 10px;
  max-height: 300px; overflow-y: auto;
}

#listaProyectos li {
  padding: 8px; cursor: pointer; display: flex; justify-content: space-between;
  border-bottom: 1px solid #eee;
}

#listaProyectos li:hover { background: #f0f0f0; }
#listaProyectos li.activo { background: #d0f0d0; }

#grafica { width: 100%; height: 300px; } /* alto fijo, no se sale */
</style>
</head>

<body>
  
<!-- ADMIN -->
<div id="vista-admin" class="admin-wrapper">
  <div class="admin-header">
    <h2>Admin</h2>
    <span id="rol"></span>
    <button onclick="logout()">Salir</button>
  </div>
  

  <div class="admin-content">
    <!-- Tarjeta lista de proyectos -->
    <div class="card">
      <h3>Proyectos</h3>
      <input id="nombreProyecto" placeholder="Nuevo proyecto">
      <button onclick="crearProyecto()">Crear</button>
      <ul id="listaProyectos"></ul>
      <button class="btn" onclick="exportarExcel()">Exportar Proyectos a Excel</button>
    </div>

    <!-- Tarjeta gráfica -->
    <div class="card card-grafica">
    <h3>Progreso semanal</h3>
    <canvas id="grafica"></canvas>
    </div>
  </div>
  
  <!-- Tarjeta gráfica antes/después -->
<div class="card card-grafica">
  <h3>Antes / Después por proyecto</h3>
  <canvas id="graficaAntesDespues"></canvas>
</div>
  
</div>

<!-- USER -->
<div id="vista-user" style="display:none;">
  <div class="user-wrapper">
    <div class="card">
<button onclick="logout()">Salir</button>
      <h3 id="userNombreProyecto">Proyecto</h3>

      <div class="resumen-semaforos">
        <div>
          PDCA
          <div class="luz" id="sem-pdca"></div>
        </div>
        <div>
          KPI
          <div class="luz" id="sem-kpi"></div>
        </div>
        <div>
          GANTT
          <div class="luz" id="sem-plan"></div>
        </div>
      </div>

      <select id="selectProyectoUser"></select>

      <div>
<p>KPI</p>
<div class="check-opciones">
<label><input type="radio" name="kpi" value="en_tiempo" onclick="setValor('kpi','en_tiempo')"> En tiempo</label>
<label><input type="radio" name="kpi" value="cumple" onclick="setValor('kpi','cumple')"> Cumple</label>
<label><input type="radio" name="kpi" value="mitigado" onclick="setValor('kpi','mitigado')"> Retraso mitigado</label>
<label><input type="radio" name="kpi" value="retraso" onclick="setValor('kpi','retraso')"> Retraso</label>
<label><input type="radio" name="kpi" value="programado" onclick="setValor('kpi','programado')"> Retraso programado</label>
<label><input type="radio" name="kpi" value="na" onclick="setValor('kpi','na')"> N/A</label>
</div>
<p>GANTT</p>
<div class="check-opciones">
<label><input type="radio" name="gantt" value="valor" onclick="setValor('gantt','valor')"> Valor agregado</label>
<label><input type="radio" name="gantt" value="retraso" onclick="setValor('gantt','retraso')"> Retraso</label>
<label><input type="radio" name="gantt" value="r2" onclick="setValor('gantt','r2')"> Retraso >2</label>
<label><input type="radio" name="gantt" value="r3" onclick="setValor('gantt','r3')"> Retraso <3</label>
<label><input type="radio" name="gantt" value="na" onclick="setValor('gantt','na')"> N/A</label>
</div>

<p>PDCA</p>
<div class="check-opciones">
<label><input type="checkbox" value="6pack" onchange="togglePDCA(this)"> 6 Pack</label>
<label><input type="checkbox" value="kpi" onchange="togglePDCA(this)"> KPI</label>
<label><input type="checkbox" value="gantt" onchange="togglePDCA(this)"> GANTT</label>
<label><input type="checkbox" value="psr" onchange="togglePDCA(this)"> PSR</label>
<label><input type="checkbox" value="iplayers" onchange="togglePDCA(this)"> IP Layers</label>
<label><input type="checkbox" value="otro" onchange="togglePDCA(this)"> Otro</label>
</div>

      <button class="btn" onclick="guardar()">Guardar</button>

    </div>
  </div>
</div>

<script>

/* ===== FIREBASE ===== */
firebase.initializeApp({
  apiKey: "AIzaSyAoVH8wQ2ofolAaJYdFnu1COcwI-xvaNnM",
  authDomain: "panel-proyectos-f119f.firebaseapp.com",
  projectId: "panel-proyectos-f119f"
});

const vistaAdmin = document.getElementById("vista-admin");
const vistaUser = document.getElementById("vista-user");
const db = firebase.firestore();

/* ===== VARIABLES ===== */
let ROL = localStorage.getItem("rol");
let UID = localStorage.getItem("uid");
let chart = null;
let proyectoId = null;
let proyecto = null;

/* ===== LOGIN ===== */
if (!UID || !ROL) {
  localStorage.clear();
  window.location.href = "login.html";
}

function aplicarRol() {
  if (ROL === "admin") {
    vistaAdmin.style.display = "block";
    vistaUser.style.display = "none";
  } else {
    vistaAdmin.style.display = "none";
    vistaUser.style.display = "block";
  }
}

/* ===== CREAR ===== */
async function crearProyecto() {
  const nombre = nombreProyecto.value.trim();
  if (!nombre) return alert("Escribe nombre");

  await db.collection("proyectos").add({
    nombre,
    evaluacion: {  
      kpi:"na", 
      gantt:"na",
      pdca:"na"
    }
  });

  cargarProyectos();
  cargarSelect();
}

/* ===== LISTA ===== */
async function cargarProyectos() {
  const snap = await db.collection("proyectos").get();
  listaProyectos.innerHTML = "";

  snap.forEach(doc => {
    const li = document.createElement("li");
    li.textContent = doc.data().nombre;

    li.onclick = () => {
      proyectoId = doc.id;
      proyecto = doc.data();
      document.querySelectorAll("#listaProyectos li").forEach(el => el.classList.remove("activo"));
      li.classList.add("activo");
      cargarGrafica(proyectoId);
    };

    const btn = document.createElement("button");
    btn.textContent = "Eliminar";
    btn.onclick = async (e) => {
      e.stopPropagation();
      if (confirm("Eliminar este proyecto?")) {
        await db.collection("proyectos").doc(doc.id).delete();
        cargarProyectos();
        cargarGrafica();
      }
    };

    li.appendChild(btn);
    listaProyectos.appendChild(li);
  });
}

/* ===== SELECT USER ===== */
async function cargarSelect() {
  const snap = await db.collection("proyectos").get();
  selectProyectoUser.innerHTML = "";

  snap.forEach(doc => {
    const op = document.createElement("option");
    op.value = doc.id;
    op.textContent = doc.data().nombre;
    selectProyectoUser.appendChild(op);
  });

  if (selectProyectoUser.value) {
    cargarProyecto(selectProyectoUser.value);
  }
}

/* ===== CARGAR PROYECTO ===== */
async function cargarProyecto(id) {
  proyectoId = id;
  const snap = await db.collection("proyectos").doc(id).get();
  if (!snap.exists) return;

  proyecto = snap.data();
  userNombreProyecto.textContent = proyecto.nombre;

  renderSemaforos();
  marcarRadios();
}

/* ===== MARCAR RADIOS ===== */
function marcarRadios() {
  if (!proyecto || !proyecto.evaluacion) return;

  Object.keys(proyecto.evaluacion).forEach(tipo => {
    const valor = proyecto.evaluacion[tipo];
    const radios = document.querySelectorAll(`input[name="${tipo}"]`);
    
    radios.forEach(r => {
      r.checked = r.value === valor;
    });
  });
}

/* ===== SET VALOR ===== */
function setValor(tipo, valor) {
  if (!proyecto) return;
  proyecto.evaluacion[tipo] = valor;
  renderSemaforos();
}

/* ===== COLORES ===== */
function color(tipo, v) {

  // ===== KPI =====
  if (tipo === "kpi") {
    if (["en_tiempo"].includes(v)) return "#008000";
    if (["cumple"].includes(v)) return "#90EE90";
    if (["mitigado"].includes(v)) return "#FFD700";
    if (["retraso"].includes(v)) return "#FF8C00";
    if (["programado"].includes(v)) return "#FF0000";
  }

  // ===== GANTT =====
  if (tipo === "gantt") {
    if (["valor"].includes(v)) return "#008000";
    if (["retraso"].includes(v)) return "#FFD700";
    if (["r2"].includes(v)) return "#FF8C00";
    if (["r3"].includes(v)) return "#FF0000";
  }

  // ===== PDCA (POR CANTIDAD) =====
  if (tipo === "pdca") {

    const cantidad = Array.isArray(v) ? v.length : 0;

    if (cantidad >= 6) return "#008000";      // verde
    if (cantidad === 5) return "#90EE90";     // verde claro
    if (cantidad === 4) return "#FFD700";     // amarillo
    if (cantidad === 3) return "#FF8C00";     // naranja
    if (cantidad < 3) return "#FF0000";       // rojo
    if (cantidad === 0) return "#808080";       // gris
  }

  return "#808080"; // gris
}

/* ===== SEMAFORO VISUAL ===== */
function renderSemaforos() {
  if (!proyecto || !proyecto.evaluacion) return;

  document.getElementById("sem-kpi").style.background =
    color("kpi", proyecto.evaluacion.kpi);

  document.getElementById("sem-plan").style.background =
    color("gantt", proyecto.evaluacion.gantt);

  document.getElementById("sem-pdca").style.background =
    color("pdca", proyecto.evaluacion.pdca);
}

/* ===== GUARDAR ===== */
async function guardar() {
  const before = await db.collection("proyectos").doc(proyectoId).get();
  const oldData = before.data();

  await db.collection("proyectos").doc(proyectoId).update({
    evaluacion: proyecto.evaluacion
  });

  await db.collection("historial").add({
    proyectoId,
    proyectoNombre: proyecto.nombre,
    usuario: UID,
    fecha: new Date(),
    antes: oldData.evaluacion,
    despues: proyecto.evaluacion
  });

  alert("Guardado ✅");
}

/* ===== PROMEDIO ===== */
function promedioEvaluacion(ev) {
  const map = {
    en_tiempo:100, cumple:90, valor:100, "6pack":100,
    mitigado:70, programado:60, r3:65,
    retraso:40, r2:20,
    na:0
  };

  return (
    (map[ev.kpi] ?? 0) +
    (map[ev.gantt] ?? 0) +
    (map[ev.pdca] ?? 0)
  ) / 3;
}

/* ===== GRAFICA ===== */
async function cargarGrafica(filtroProyectoId = null) {
  const snap = await db.collection("historial").orderBy("fecha").get();
  const semanas = {};

  snap.forEach(doc => {
    const d = doc.data();
    if (filtroProyectoId && d.proyectoId !== filtroProyectoId) return;

    const f = d.fecha.toDate();
    const semana = f.getFullYear() + "-W" + Math.ceil(f.getDate()/7);

    if (!semanas[semana]) semanas[semana] = [];
    semanas[semana].push(promedioEvaluacion(d.despues));
  });

  const labels = Object.keys(semanas).sort();
  const data = labels.map(sem => {
    const arr = semanas[sem];
    return arr.reduce((a,b)=>a+b,0)/arr.length;
  });

  const ctx = document.getElementById("grafica").getContext("2d");
  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets:[{ label:"Promedio semanal", data }] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: { y: { beginAtZero:true, max:100 } }
    }
  });
}

/* ===== EXCEL ===== */
function exportarExcel() {
  db.collection("proyectos").get().then(snap => {
    const data = [];

    const map = {
      en_tiempo:100, cumple:90, valor:100, "6pack":100,
      mitigado:70, programado:60, r3:65,
      retraso:40, r2:20,
      na:0
    };

    snap.forEach(doc => {
      const p = doc.data();
      data.push({
        Proyecto: p.nombre,
        KPI: map[p.evaluacion.kpi] ?? 0,
        GANTT: map[p.evaluacion.gantt] ?? 0,
        PDCA: map[p.evaluacion.pdca] ?? 0
      });
    });

    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Proyectos");
    XLSX.writeFile(wb, "Proyectos.xlsx");
  });
}

/* ===== LOGOUT ===== */
function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}

/* ===== EVENTOS ===== */
selectProyectoUser.onchange = () => {
  cargarProyecto(selectProyectoUser.value);
};

/* ===== TOGGLE ===== */
function togglePDCA(checkbox) {
  if (!proyecto) return;

  if (!Array.isArray(proyecto.evaluacion.pdca)) {
    proyecto.evaluacion.pdca = [];
  }

  if (checkbox.checked) {
    proyecto.evaluacion.pdca.push(checkbox.value);
  } else {
    proyecto.evaluacion.pdca =
      proyecto.evaluacion.pdca.filter(v => v !== checkbox.value);
  }

  renderSemaforos();
}
/* ===== INIT ===== */
aplicarRol();
cargarProyectos();
cargarSelect();
cargarGrafica();

</script>

</body>
</html>
