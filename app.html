<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Proyectos</title>

<!-- FIREBASE COMPAT -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
}

/* ===== ADMIN ===== */
.admin-wrapper { padding:20px; }
.admin-header {
  background:#fff; padding:15px; border-radius:10px;
  display:flex; justify-content:space-between;
}

.lista-proyectos li {
  padding:8px; cursor:pointer;
}
.lista-proyectos li:hover {
  background:#eee;
}

/* ===== USER ===== */
.user-wrapper {
  display:flex;
  justify-content:center;
  margin-top:20px;
}

.card {
  width:320px;
  background:#fff;
  padding:15px;
  border-radius:10px;
}

.luz {
  width:25px;
  height:25px;
  border-radius:50%;
  background:gray;
  margin:auto;
}

.resumen-semaforos {
  display:flex;
  justify-content:space-around;
  margin-bottom:10px;
}

.btn {
  width:100%;
  padding:10px;
  background:#4caf50;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- ADMIN -->
<div id="vista-admin" style="display:none;">
  <div class="admin-wrapper">

    <div class="admin-header">
      <h2>Admin</h2>
      <span id="rol"></span>
    </div>

    <input id="nombreProyecto" placeholder="Nuevo proyecto">
    <button onclick="crearProyecto()">Crear</button>

    <ul id="listaProyectos"></ul>

  </div>
</div>

<!-- USER -->
<div id="vista-user" style="display:none;">
  <div class="user-wrapper">
    <div class="card">

      <h3 id="userNombreProyecto">Proyecto</h3>

      <div class="resumen-semaforos">
        <div>
          PSR
          <div class="luz" id="sem-psr"></div>
        </div>
        <div>
          KPI
          <div class="luz" id="sem-kpi"></div>
        </div>
        <div>
          GANTT
          <div class="luz" id="sem-plan"></div>
        </div>
      </div>

      <select id="selectProyectoUser"></select>

      <div>
        <p>PSR</p>
        <select onchange="cambiarEvaluacion('psr', this.value)">
          <option value="bueno">Bueno</option>
          <option value="medio">Medio</option>
          <option value="malo">Malo</option>
        </select>

        <p>KPI</p>
        <select onchange="cambiarEvaluacion('kpi', this.value)">
          <option value="bueno">Bueno</option>
          <option value="medio">Medio</option>
          <option value="malo">Malo</option>
        </select>

        <p>GANTT</p>
        <select onchange="cambiarEvaluacion('gantt', this.value)">
          <option value="bueno">Bueno</option>
          <option value="medio">Medio</option>
          <option value="malo">Malo</option>
        </select>
      </div>

      <button class="btn" onclick="guardar()">Guardar</button>

    </div>
  </div>
</div>

<script>

/* ===== FIREBASE ===== */
firebase.initializeApp({
  apiKey: apiKey: "AIzaSyAoVH8wQ2ofolAaJYdFnu1COcwI-xvaNnM",
  authDomain: "panel-proyectos-f119f.firebaseapp.com",
  projectId: "panel-proyectos-f119f"
});

const db = firebase.firestore();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

auth.signInWithPopup(provider)
  .catch(e => console.error(e));
  
/* ===== VARIABLES ===== */
let ROL = null;
let UID = null;
let proyectoId = null;
let proyecto = null;

/* ===== LOGIN ===== */
auth.onAuthStateChanged(async user => {

  if (!user) return;

  UID = user.uid;
  const email = user.email || "";

  let rolDetectado = "usuario";

  // 🔥 REGLA AUTOMÁTICA
  if (email.includes("@proyectosg.com")) {
    rolDetectado = "admin";
  }

  // 🔥 GUARDAR / ACTUALIZAR EN FIREBASE
  const ref = db.collection("users").doc(UID);
  const snap = await ref.get();

  if (!snap.exists) {
    await ref.set({
      email,
      rol: rolDetectado
    });
  }

  ROL = rolDetectado;

  aplicarRol();
  cargarProyectos();
  cargarSelect();

});

/* ===== ROLES ===== */
function aplicarRol() {

  if (ROL === "admin") {
    vistaAdmin.style.display = "block";
    vistaUser.style.display = "none";
  } else {
    vistaAdmin.style.display = "none";
    vistaUser.style.display = "block";
  }

}

/* ===== CREAR ===== */
async function crearProyecto() {

  const nombre = nombreProyecto.value.trim();

  if (!nombre) return alert("Escribe nombre");

  await db.collection("proyectos").add({
    nombre,
    evaluacion: { psr:"medio", kpi:"medio", gantt:"medio" }
  });

}

/* ===== LISTA ADMIN ===== */
function cargarProyectos() {

  db.collection("proyectos").onSnapshot(snap => {

    listaProyectos.innerHTML = "";

    snap.forEach(doc => {

      const li = document.createElement("li");
      li.textContent = doc.data().nombre;

      li.onclick = () => cargarProyecto(doc.id);

      listaProyectos.appendChild(li);

    });

  });

}

/* ===== SELECT USER ===== */
function cargarSelect() {

  db.collection("proyectos").onSnapshot(snap => {

    selectProyectoUser.innerHTML = "";

    snap.forEach(doc => {

      const op = document.createElement("option");
      op.value = doc.id;
      op.textContent = doc.data().nombre;

      selectProyectoUser.appendChild(op);

    });

    if (selectProyectoUser.value) {
      cargarProyecto(selectProyectoUser.value);
    }

  });

}

/* ===== CARGAR PROYECTO ===== */
async function cargarProyecto(id) {

  proyectoId = id;

  const snap = await db.collection("proyectos").doc(id).get();

  if (!snap.exists) return;

  proyecto = snap.data();

  userNombreProyecto.textContent = proyecto.nombre;

  renderSemaforos();

}

/* ===== CAMBIAR ===== */
function cambiarEvaluacion(tipo, valor) {

  proyecto.evaluacion[tipo] = valor;

  renderSemaforos();

}

/* ===== SEMAFOROS ===== */
function renderSemaforos() {

  semPsr.style.background = color(proyecto.evaluacion.psr);
  semKpi.style.background = color(proyecto.evaluacion.kpi);
  semPlan.style.background = color(proyecto.evaluacion.gantt);

}

function color(v) {
  if (v==="bueno") return "green";
  if (v==="medio") return "orange";
  return "red";
}

/* ===== GUARDAR ===== */
async function guardar() {

  await db.collection("proyectos").doc(proyectoId).update({
    evaluacion: proyecto.evaluacion
  });

  alert("Guardado");

}

/* ===== SELECT CHANGE ===== */
selectProyectoUser.onchange = () => {
  cargarProyecto(selectProyectoUser.value);
};

</script>

</body>
</html>
