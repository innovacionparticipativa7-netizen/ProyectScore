  <style>
* {
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;

/* ===== HEADER ===== */
.admin-header {

  padding: 15px;

/* ===== LAYOUT ===== */

/* ===== CARDS ===== */
.card {
  background: white;
  border-radius: 18px;
  padding: 15px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  flex: 1 1 300px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-3px);
}

/* ===== INPUT ===== */
input, select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-top: 8px;
  margin-bottom: 10px;
}

/* ===== BOTONES ===== */
button {
  border: none;
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  font-weight: bold;
}

.btn {
  width: 100%;
  background: linear-gradient(135deg, #4caf50, #2e7d32);
  color: white;
}

button:hover {

}

/* ===== LISTA ===== */
#listaProyectos li {
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 5px;
  background: #f4f6f8;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#listaProyectos li.activo {
  background: #c8f7c5;
}

/* ===== USER CARD ===== */
.user-wrapper {
  padding: 15px;
}

.card-user {
  max-width: 420px;
  margin: auto;
}

/* ===== SEMAFOROS ===== */
.resumen-semaforos {

}

.luz {
  width: 35px;

  box-shadow: 0 0 10px rgba(0,0,0,0.2);

/* ===== CHECKS BONITOS ===== */

.check-opciones label:hover {

/* ===== GRAFICAS ===== */
.card-grafica {
  height: 350px;

canvas {

/* ===== MOBILE ===== */

  }

    width: 100%;

select {

select:focus {

<script>
window.onerror = function (msg, url, line) {
  alert("Error: " + msg + " en línea " + line);
};
/* ===== FIREBASE ===== */
firebase.initializeApp({
  apiKey: "AIzaSyAoVH8wQ2ofolAaJYdFnu1COcwI-xvaNnM",
  authDomain: "panel-proyectos-f119f.firebaseapp.com",
  projectId: "panel-proyectos-f119f"
});

const vistaAdmin = document.getElementById("vista-admin");
const vistaUser = document.getElementById("vista-user");
const db = firebase.firestore();
const selectProyectoUser = document.getElementById("selectProyectoUser");
const listaProyectos = document.getElementById("listaProyectos");
/* ===== VARIABLES ===== */
let ROL = (localStorage.getItem("rol") || "").toLowerCase().trim();
let UID = localStorage.getItem("uid");
let proyectoId = null;
let proyecto = null;

/* ===== LOGIN ===== */
if (!UID || !ROL) {
  localStorage.clear();
  window.location.href = "login.html";
}

console.log("ROL:", ROL);
  
function aplicarRol() {
  if (ROL === "admin") {
    vistaAdmin.style.display = "block";
    vistaUser.style.display = "none";
  } else {
    vistaAdmin.style.display = "none";
    vistaUser.style.display = "flex"; // 👈 CAMBIO CLAVE
    vistaUser.style.flexDirection = "column";
  }
}
/* ===== CREAR ===== */
async function crearProyecto() {
  const nombre = document.getElementById("nombreProyecto").value.trim();
  const tier = document.getElementById("tierProyecto").value;
  const seccion = document.getElementById("seccionProyecto").value;
  const champion = document.getElementById("championProyecto").value;

  const sponsor = document.getElementById("sponsorProyecto").value;
const owner = document.getElementById("ownerProyecto").value;

if (!nombre || !tier || !seccion || !champion || !sponsor || !owner) {
  return alert("Completa todos los campos");
}

await db.collection("proyectos").add({
  nombre,
  tier,
  seccion,
  champion,
  sponsor,
  owner,
  evaluacion: {
    kpi: "",
    gantt: "",
    pdca: []
  }
});
  // limpiar campos
  nombreProyecto.value = "";
  tierProyecto.value = "";
  seccionProyecto.value = "";
  championProyecto.innerHTML = '<option value="">Selecciona Champion</option>';

  cargarProyectos();
  cargarSelect();

  alert("Proyecto creado ✅");
}



/* ===== SELECT USER ===== */
async function cargarSelect() {
  try {
    const snap = await db.collection("proyectos").get();

    selectProyectoUser.innerHTML = "";

    if (snap.empty) {
      console.warn("No hay proyectos en Firestore");

      document.getElementById("userNombreProyecto").innerText = "No hay proyectos";
      document.getElementById("infoChampion").innerText = "-";
      document.getElementById("infoSponsor").innerText = "-";
      document.getElementById("infoOwner").innerText = "-";

      return;
    }

    let primerId = null;

    snap.forEach(doc => {
      const data = doc.data();

      const op = document.createElement("option");
      op.value = doc.id;
      op.textContent = data.nombre || "Sin nombre";

      selectProyectoUser.appendChild(op);

      if (!primerId) primerId = doc.id;
    });

    // 🔥 FORZAR CARGA DEL PRIMERO
    if (primerId) {
      selectProyectoUser.value = primerId;

      console.log("Cargando primer proyecto:", primerId);

      await cargarProyecto(primerId);
      
    }

  } catch (error) {
    console.error("Error en cargarSelect:", error);
    alert("Error cargando proyectos");
  }
}


  
/* ===== CARGAR PROYECTO ===== */
function cargarProyectos() {
  db.collection("proyectos").onSnapshot(snap => {
    listaProyectos.innerHTML = "";

    snap.forEach(doc => {
      const data = doc.data();

      const li = document.createElement("li");
      li.textContent = data.nombre || "Sin nombre";

      li.onclick = () => {
        proyectoId = doc.id;
        proyecto = data;

        // 🔥 asegurar estructura
        if (!proyecto.evaluacion) {
          proyecto.evaluacion = {
            kpi: "",
            gantt: "",
            pdca: []
          };
        }

        console.log("Proyecto seleccionado:", proyecto);

        document.querySelectorAll("#listaProyectos li")
          .forEach(el => el.classList.remove("activo"));

        li.classList.add("activo");
      };

      const btn = document.createElement("button");
      btn.textContent = "Eliminar";

      btn.onclick = async (e) => {
        e.stopPropagation();
        if (confirm("Eliminar este proyecto?")) {
          await db.collection("proyectos").doc(doc.id).delete();
        }
      };

      li.appendChild(btn);
      listaProyectos.appendChild(li);
    });
  });
}
/* ===== MARCAR RADIOS ===== */
function marcarRadios() {
  if (!proyecto || !proyecto.evaluacion) return;

  // KPI y GANTT
  ["kpi", "gantt"].forEach(tipo => {
    const valor = proyecto.evaluacion[tipo];
    const radios = document.querySelectorAll(`input[name="${tipo}"]`);

    radios.forEach(r => {
      r.checked = r.value === valor;
    });
  });

  // PDCA (checkboxes)
  const checks = document.querySelectorAll('input[type="checkbox"]');

  checks.forEach(c => {
    c.checked = proyecto.evaluacion.pdca?.includes(c.value);
  });
}
  
async function cargarProyecto(id) {
  if (!id) return;

  try {
    proyectoId = id;
    const snap = await db.collection("proyectos").doc(id).get();

    if (!snap.exists) return;

    proyecto = snap.data();

if (!proyecto.evaluacion) {
  proyecto.evaluacion = {
    kpi: "",
    gantt: "",
    pdca: []
  };
}

    document.getElementById("userNombreProyecto").innerText = proyecto.nombre || "-";
    document.getElementById("infoChampion").innerText = proyecto.champion || "-";
    document.getElementById("infoSponsor").innerText = proyecto.sponsor || "-";
    document.getElementById("infoOwner").innerText = proyecto.owner || "-";

    renderSemaforos();
    marcarRadios();

  } catch (error) {
    console.error("Error cargarProyecto:", error);
  }
}
  
  
/* ===== SET VALOR ===== */
function setValor(tipo, valor) {
  if (!proyecto) return;
  proyecto.evaluacion[tipo] = valor;
  renderSemaforos();
}

function color(tipo, v) {
  if (!v || (Array.isArray(v) && v.length === 0)) {
    return "#808080";
  }

  // ===== KPI =====
  if (tipo === "kpi") {
    if (["en_tiempo"].includes(v)) return "#008000";
    if (["cumple"].includes(v)) return "#90EE90";
    if (["mitigado"].includes(v)) return "#FFD700";
    if (["retraso"].includes(v)) return "#FF8C00";
    if (["programado"].includes(v)) return "#FF0000";
  }

  // ===== GANTT =====
  if (tipo === "gantt") {
    if (["valor"].includes(v)) return "#008000";
    if (["retraso"].includes(v)) return "#FFD700";
    if (["r2"].includes(v)) return "#FF8C00";
    if (["r3"].includes(v)) return "#FF0000";
  }

  // ===== PDCA =====
  if (tipo === "pdca") {

    const cantidad = Array.isArray(v) ? v.length : 0;

    if (cantidad === 5) return "#008000";
    if (cantidad === 4) return "#90EE90";
    if (cantidad === 3) return "#FFD700";
    if (cantidad === 2) return "#FF8C00";
    if (cantidad === 1) return "#FF0000";
    if (cantidad === 0) return "#FF8C00";
  }

  return "#808080";
}
/* ===== SEMAFORO VISUAL ===== */
function renderSemaforos() {
  if (!proyecto || !proyecto.evaluacion) {
    console.warn("Sin proyecto cargado");
    return;
  }

  document.getElementById("sem-kpi").style.background =
    color("kpi", proyecto.evaluacion.kpi);

  document.getElementById("sem-plan").style.background =
    color("gantt", proyecto.evaluacion.gantt);

  document.getElementById("sem-pdca").style.background =
    color("pdca", proyecto.evaluacion.pdca);

  document.getElementById("porc-kpi").innerText =
    obtenerPorcentaje("kpi", proyecto.evaluacion.kpi) + "%";

  document.getElementById("porc-gantt").innerText =
    obtenerPorcentaje("gantt", proyecto.evaluacion.gantt) + "%";

  document.getElementById("porc-pdca").innerText =
    obtenerPorcentaje("pdca", proyecto.evaluacion.pdca) + "%";
}
/* ===== GUARDAR ===== */
async function guardar() {
  const before = await db.collection("proyectos").doc(proyectoId).get();
  const oldData = before.data();

  await db.collection("proyectos").doc(proyectoId).update({
    evaluacion: proyecto.evaluacion
  });

  await db.collection("historial").add({
    proyectoId,
    proyectoNombre: proyecto.nombre,
    usuario: UID,
    fecha: new Date(),
    antes: oldData.evaluacion,
    despues: proyecto.evaluacion
  });

  alert("Guardado ✅");
}

/* ===== PROMEDIO ===== */
function promedioEvaluacion(ev) {
  const map = {
    en_tiempo:100, cumple:90, valor:100, "6pack":100,
    mitigado:70, programado:60, r3:65,
    retraso:40, r2:20,
    na:0
  };

const pdcaScore = Array.isArray(ev.pdca) ? ev.pdca.length * 20 : 0;

return (
  (map[ev.kpi] ?? 0) +
  (map[ev.gantt] ?? 0) +
  pdcaScore
) / 3;
}

/* ===== EXCEL ===== */
function exportarExcel() {
  db.collection("proyectos").get().then(snap => {
    const data = [];

    const map = {
      en_tiempo:100, cumple:90, valor:100, "6pack":100,
      mitigado:70, programado:60, r3:65,
      retraso:40, r2:20,
      na:0
    };

    snap.forEach(doc => {
      const p = doc.data();
      data.push({
        Proyecto: p.nombre,
        KPI: map[p.evaluacion.kpi] ?? 0,
        GANTT: map[p.evaluacion.gantt] ?? 0,
        PDCA: obtenerPorcentaje("pdca", p.evaluacion.pdca)
      });
    });

    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Proyectos");
    XLSX.writeFile(wb, "Proyectos.xlsx");
  });
}

/* ===== LOGOUT ===== */
function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}
/* ===== EVENTOS ===== */
document.addEventListener("change", (e) => {
  if (e.target && e.target.id === "selectProyectoUser") {
    cargarProyecto(e.target.value);
  }
});
/* ===== TOGGLE ===== */
function togglePDCA(checkbox) {
  if (!proyecto) return;

  if (!Array.isArray(proyecto.evaluacion.pdca)) {
    proyecto.evaluacion.pdca = [];
  }

  if (checkbox.checked) {
    proyecto.evaluacion.pdca.push(checkbox.value);
  } else {
    proyecto.evaluacion.pdca =
      proyecto.evaluacion.pdca.filter(v => v !== checkbox.value);
  }

  renderSemaforos();
}


  /* ===== PORCENTAJES ===== */
  function obtenerPorcentaje(tipo, v) {

  // ===== KPI =====
  if (tipo === "kpi") {
    if (v === "en_tiempo") return 100;
    if (v === "cumple") return 90;
    if (v === "mitigado") return 70;
    if (v === "retraso") return 50;
    if (v === "programado") return 30;
    return 0;
  }

  // ===== GANTT =====
  if (tipo === "gantt") {
    if (v === "valor") return 100;
    if (v === "retraso") return 70;
    if (v === "r2") return 50;
    if (v === "r3") return 30;
    return 0;
  }

  // ===== PDCA =====
  if (tipo === "pdca") {
    const cantidad = Array.isArray(v) ? v.length : 0;

    if (cantidad >= 5) return 100;
    if (cantidad === 4) return 80;
    if (cantidad === 3) return 60;
    if (cantidad === 2) return 40;
    if (cantidad === 1) return 20;
    return 0;
  }

  return 0;
}

/* ===== RELACION SECCION → CHAMPIONS  ===== */
const championsPorSeccion = {
  "Buy to Make": ["Antonio Aguilar"],
  "DTC": ["Jaime Castro"],
  "Material Optimization": ["Fabian Perez", "Jorge Millan"],
  "Resourcing": ["Gerardo Loredo"],

/* ===== FUNCION DE FILTRADO  ===== */
async function aplicarFiltros() {
  const tier = document.getElementById("filtroTier").value;
  const seccion = document.getElementById("filtroSeccion").value;
  const champion = document.getElementById("filtroChampion").value;

  

  const snap = await db.collection("proyectos").get();

  // limpiar select
  selectProyectoUser.innerHTML = "";

  snap.forEach(doc => {
    const p = doc.data();

    // aplicar filtros
    if (tier && p.tier !== tier) return;
    if (seccion && p.seccion !== seccion) return;
    if (champion && p.champion !== champion) return;

    const op = document.createElement("option");
    op.value = doc.id;
    op.textContent = p.nombre;

    selectProyectoUser.appendChild(op);
  });

  // 🔴 SI NO HAY RESULTADOS
  if (selectProyectoUser.options.length === 0) {
    const op = document.createElement("option");
    op.textContent = "Sin resultados";
    op.value = "";
    selectProyectoUser.appendChild(op);

    // limpiar vista
    document.getElementById("userNombreProyecto").innerText = "Sin resultados";
    document.getElementById("infoChampion").innerText = "-";
    document.getElementById("infoSponsor").innerText = "-";
    document.getElementById("infoOwner").innerText = "-";

    return;
  }

  // 🔥 FORZAR selección del primero
  const primerId = selectProyectoUser.options[0].value;
  selectProyectoUser.value = primerId;

  // cargar proyecto automáticamente
  cargarProyecto(primerId);
}

/* ===== SUBIR EXCEL ===== */
  
async function cargarExcel() {
  const file = document.getElementById("inputExcel").files[0];

  if (!file) {
    return alert("Selecciona un archivo");
  }

  const reader = new FileReader();

  reader.onload = async (e) => {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: "array" });

    const hoja = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(hoja);

    await guardarMasivo(json);
  };

  reader.readAsArrayBuffer(file);
}

  /* ===== CARGA MASIVA ===== */

async function guardarMasivo(data) {

  let errores = [];
  let exitos = 0;

  for (let i = 0; i < data.length; i++) {
    const row = data[i];

    const nombre = row.nombre;
    const tier = row.tier;
    const seccion = row.seccion;
    const champion = row.champion;
    const sponsor = row.sponsor;
    const owner = row.owner;
    
    if (!nombre || !tier || !seccion || !champion || !sponsor || !owner) {
      errores.push(`Fila ${i+2} incompleta`);
      continue;
    }

    // VALIDAR VALORES CORRECTOS
    if (!validarDatos(row)) {
      errores.push(`Fila ${i+2} datos inválidos`);
      continue;
    }

    try {
     await db.collection("proyectos").add({
      nombre,
      tier,
      seccion,
      champion,
      sponsor,
      owner,
      evaluacion: {
        kpi: "",
        gantt: "",
        pdca: []
      }
    });

      exitos++;

    } catch (err) {
      errores.push(`Fila ${i+2} error al guardar`);
    }
  }

  cargarProyectos();
  cargarSelect();

  alert(`Carga completada ✅
✔ ${exitos} proyectos cargados
❌ ${errores.length} errores`);

  console.log("Errores:", errores);
}
  
function validarDatos(row) {
  const tiers = ["Tier 1","Tier 2","Tier 3","Tier 4","Tier 5","Tier 6"];
  const secciones = [
    "Buy to Make",
    "DTC",
    "Material Optimization",
    "OH Cost Control",
    "Resourcing"
  ];

  if (!tiers.includes(row.tier)) return false;
  if (!secciones.includes(row.seccion)) return false;

  return true;
}

function toggleCrear() {
  const form = document.getElementById("formCrear");

  if (form.style.display === "none") {
    form.style.display = "block";
    form.style.opacity = "0";
    setTimeout(() => form.style.opacity = "1", 50);
  } else {
    form.style.opacity = "0";
    setTimeout(() => form.style.display = "none", 200);
  }
}
