<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Proyectos</title>

<!-- FIREBASE COMPAT -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  
  <style>
* {
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #eef2f7, #e3e9f0);
}

/* ===== HEADER ===== */
.admin-header {
  background: #1f2937;
  color: white;
  padding: 15px;
  border-radius: 0 0 15px 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ===== LAYOUT ===== */
.admin-content {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  padding: 15px;
}

/* ===== CARDS ===== */
.card {
  background: white;
  border-radius: 18px;
  padding: 15px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  flex: 1 1 300px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-3px);
}

/* ===== INPUT ===== */
input, select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-top: 8px;
  margin-bottom: 10px;
}

/* ===== BOTONES ===== */
button {
  border: none;
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  font-weight: bold;
}

.btn {
  width: 100%;
  background: linear-gradient(135deg, #4caf50, #2e7d32);
  color: white;
}

button:hover {
  opacity: 0.9;
}

/* ===== LISTA ===== */
#listaProyectos li {
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 5px;
  background: #f4f6f8;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#listaProyectos li.activo {
  background: #c8f7c5;
}

/* ===== USER CARD ===== */
.user-wrapper {
  padding: 15px;
}

.card-user {
  max-width: 420px;
  margin: auto;
}

/* ===== SEMAFOROS ===== */
.resumen-semaforos {
  display: flex;
  justify-content: space-between;
  margin: 15px 0;
}

.luz {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  background: gray;
  margin-top: 5px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

/* ===== CHECKS BONITOS ===== */
.check-opciones label {
  display: block;
  background: #f4f6f8;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.check-opciones input {
  margin-right: 8px;
}

.check-opciones label:hover {
  background: #e0e7ff;
}

/* ===== GRAFICAS ===== */
.card-grafica {
  height: 350px;
  display: flex;
  flex-direction: column;
}

canvas {
  flex: 1;
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {
  .admin-content {
    flex-direction: column;
  }

  .card {
    width: 100%;
  }

  .admin-header {
    flex-direction: column;
    gap: 10px;
  }
}

select {
  background: #f9fafb;
  border: 1px solid #ddd;
  transition: 0.2s;
}

select:focus {
  border-color: #4caf50;
  outline: none;
  box-shadow: 0 0 5px rgba(76,175,80,0.4);
}

.admin-content {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.card {
  min-height: 200px;
}

#formCrear {
  transition: all 0.3s ease;
}
    
</style>

  
</head>

<body>
  
<!-- ADMIN -->
<div id="vista-admin" class="admin-wrapper">
  <div class="admin-header">
    <h2>Admin</h2>
    <span id="rol"></span>
    <button onclick="logout()">Salir</button>
  </div>
  

  <div class="admin-content">
    <!-- Tarjeta lista de proyectos -->
    <div class="card">
  <h3>Proyectos</h3>

  <button class="btn" onclick="toggleCrear()">+ Nuevo Proyecto</button>

  <div id="formCrear" style="display:none; margin-top:10px;">

    <input id="nombreProyecto" placeholder="Nombre del proyecto">

    <select id="tierProyecto">
      <option value="">Selecciona Tier</option>
      <option>Tier 1</option>
      <option>Tier 2</option>
      <option>Tier 3</option>
      <option>Tier 4</option>
      <option>Tier 5</option>
      <option>Tier 6</option>
    </select>

    <select id="seccionProyecto" onchange="cargarChampionsProyecto()">
      <option value="">Selecciona Sección</option>
      <option>Buy to Make</option>
      <option>DTC</option>
      <option>Material Optimization</option>
      <option>OH Cost Control</option>
      <option>Resourcing</option>
    </select>

    <select id="championProyecto">
      <option value="">Selecciona Champion</option>
    </select>

    <input id="sponsorProyecto" placeholder="Sponsor">
    <input id="ownerProyecto" placeholder="Owner">

    <button class="btn" onclick="crearProyecto()">Crear</button>

  </div>

  <hr>

  <ul id="listaProyectos"></ul>

  <button class="btn" onclick="exportarExcel()">Exportar</button>
  <button class="btn" onclick="descargarPlantilla()">Plantilla</button>

  <input type="file" id="inputExcel" accept=".xlsx, .xls">
  <button onclick="cargarExcel()">Cargar Excel</button>

</div>

  
</div>

<!-- USER -->
<div id="vista-user" style="display:none;">
  <div class="user-wrapper">
    <div class="card card-user">
<button onclick="logout()">Salir</button>
      <div class="card">
  <h3>Filtros</h3>

  <select id="filtroTier" onchange="aplicarFiltros()">
    <option value="">Todos los Tier</option>
    <option>Tier 1</option>
    <option>Tier 2</option>
    <option>Tier 3</option>
    <option>Tier 4</option>
    <option>Tier 5</option>
    <option>Tier 6</option>
  </select>

  <select id="filtroSeccion" onchange="aplicarFiltros()">
    <option value="">Todas las Secciones</option>
    <option>Buy to Make</option>
    <option>DTC</option>
    <option>Material Optimization</option>
    <option>OH Cost Control</option>
    <option>Resourcing</option>
  </select>

  <select id="filtroChampion" onchange="aplicarFiltros()">
    <option value="">Todos los Champions</option>
  </select>

</div>
<p><b>Champion:</b> <span id="infoChampion"></span></p>
<p><b>Sponsor:</b> <span id="infoSponsor"></span></p>
<p><b>Owner:</b> <span id="infoOwner"></span></p>
      <div class="resumen-semaforos">
  <div style="text-align:center;">
    PDCA
    <div class="luz" id="sem-pdca"></div>
    <div id="porc-pdca">0%</div>
  </div>

  <div style="text-align:center;">
    KPI
    <div class="luz" id="sem-kpi"></div>
    <div id="porc-kpi">0%</div>
  </div>

  <div style="text-align:center;">
    GANTT
    <div class="luz" id="sem-plan"></div>
    <div id="porc-gantt">0%</div>
  </div>
</div>
<p><b>Proyecto:</b> <span id="userNombreProyecto"></span></p>
      <select id="selectProyectoUser"></select>

      <div>
<p>KPI</p>
<div class="check-opciones">
<label><input type="radio" name="kpi" value="en_tiempo" onclick="setValor('kpi','en_tiempo')"> En tiempo</label>
<label><input type="radio" name="kpi" value="cumple" onclick="setValor('kpi','cumple')"> Cumple</label>
<label><input type="radio" name="kpi" value="mitigado" onclick="setValor('kpi','mitigado')"> Retraso mitigado</label>
<label><input type="radio" name="kpi" value="retraso" onclick="setValor('kpi','retraso')"> Retraso</label>
<label><input type="radio" name="kpi" value="programado" onclick="setValor('kpi','programado')"> Retraso programado</label>
<label><input type="radio" name="kpi" value="na" onclick="setValor('kpi','na')"> N/A</label>
</div>
<p>GANTT</p>
<div class="check-opciones">
<label><input type="radio" name="gantt" value="valor" onclick="setValor('gantt','valor')"> Valor agregado</label>
<label><input type="radio" name="gantt" value="retraso" onclick="setValor('gantt','retraso')"> Retraso</label>
<label><input type="radio" name="gantt" value="r2" onclick="setValor('gantt','r2')"> Retraso >2</label>
<label><input type="radio" name="gantt" value="r3" onclick="setValor('gantt','r3')"> Retraso <3</label>
<label><input type="radio" name="gantt" value="na" onclick="setValor('gantt','na')"> N/A</label>
</div>

<p>PDCA</p>
<div class="check-opciones">
<label><input type="checkbox" value="6pack" onchange="togglePDCA(this)"> 6 Pack</label>
<label><input type="checkbox" value="kpi" onchange="togglePDCA(this)"> KPI</label>
<label><input type="checkbox" value="gantt" onchange="togglePDCA(this)"> GANTT</label>
<label><input type="checkbox" value="psr" onchange="togglePDCA(this)"> PSR</label>
<label><input type="checkbox" value="iplayers" onchange="togglePDCA(this)"> IP Layers</label>
</div>

      <button class="btn" onclick="guardar()">Guardar</button>

    </div>
  </div>
</div>

<script>
/* ===== DEBUG ===== */
window.onerror = function (msg, url, line) {
  alert("Error: " + msg + " en línea " + line);
};

/* ===== FIREBASE ===== */
firebase.initializeApp({
  apiKey: "AIzaSyAoVH8wQ2ofolAaJYdFnu1COcwI-xvaNnM",
  authDomain: "panel-proyectos-f119f.firebaseapp.com",
  projectId: "panel-proyectos-f119f"
});

const db = firebase.firestore();

/* ===== DOM ===== */
const vistaAdmin = document.getElementById("vista-admin");
const vistaUser = document.getElementById("vista-user");
const selectProyectoUser = document.getElementById("selectProyectoUser");
const listaProyectos = document.getElementById("listaProyectos");

/* ===== VARIABLES ===== */
let ROL = (localStorage.getItem("rol") || "").toLowerCase().trim();
let UID = localStorage.getItem("uid");
let proyectoId = null;
let proyecto = null;

/* ===== LOGIN ===== */
if (!UID || !ROL) {
  localStorage.clear();
  window.location.href = "login.html";
}

/* ===== ROLES ===== */
function aplicarRol() {
  if (ROL === "admin") {
    vistaAdmin.style.display = "block";
    vistaUser.style.display = "none";
  } else {
    vistaAdmin.style.display = "none";
    vistaUser.style.display = "block";
  }
}

/* ===== CREAR PROYECTO ===== */
async function crearProyecto() {
  const nombre = nombreProyecto.value.trim();
  const tier = tierProyecto.value;
  const seccion = seccionProyecto.value;
  const champion = championProyecto.value;
  const sponsor = sponsorProyecto.value;
  const owner = ownerProyecto.value;

  if (!nombre || !tier || !seccion || !champion || !sponsor || !owner) {
    return alert("Completa todos los campos");
  }

  await db.collection("proyectos").add({
    nombre, tier, seccion, champion, sponsor, owner,
    evaluacion: { kpi: "", gantt: "", pdca: [] }
  });

  nombreProyecto.value = "";
  tierProyecto.value = "";
  seccionProyecto.value = "";
  championProyecto.innerHTML = '<option value="">Selecciona Champion</option>';

  cargarProyectos();
  cargarSelect();

  alert("Proyecto creado ✅");
}

/* ===== CARGAR SELECT USER ===== */
function cargarSelect() {
  db.collection("proyectos").onSnapshot(snap => {
    selectProyectoUser.innerHTML = "";

    snap.forEach(doc => {
      const op = document.createElement("option");
      op.value = doc.id;
      op.textContent = doc.data().nombre;
      selectProyectoUser.appendChild(op);
    });

    if (selectProyectoUser.value) {
      cargarProyecto(selectProyectoUser.value);
    }
  });
}

/* ===== LISTA ADMIN ===== */
function cargarProyectos() {
  db.collection("proyectos").onSnapshot(snap => {
    listaProyectos.innerHTML = "";

    snap.forEach(doc => {
      const li = document.createElement("li");
      li.textContent = doc.data().nombre;

      li.onclick = () => {
        proyectoId = doc.id;
        proyecto = doc.data();
        document.querySelectorAll("#listaProyectos li")
          .forEach(el => el.classList.remove("activo"));
        li.classList.add("activo");
      };

      const btn = document.createElement("button");
      btn.textContent = "Eliminar";
      btn.onclick = async (e) => {
        e.stopPropagation();
        if (confirm("Eliminar este proyecto?")) {
          await db.collection("proyectos").doc(doc.id).delete();
        }
      };

      li.appendChild(btn);
      listaProyectos.appendChild(li);
    });
  });
}

/* ===== CARGAR PROYECTO ===== */
async function cargarProyecto(id) {
  proyectoId = id;
  const snap = await db.collection("proyectos").doc(id).get();
  if (!snap.exists) return;

  proyecto = snap.data();

  userNombreProyecto.innerText = proyecto.nombre;
  infoChampion.innerText = proyecto.champion || "-";
  infoSponsor.innerText = proyecto.sponsor || "-";
  infoOwner.innerText = proyecto.owner || "-";

  renderSemaforos();
  marcarRadios();
}

/* ===== RADIOS ===== */
function marcarRadios() {
  if (!proyecto?.evaluacion) return;

  ["kpi", "gantt"].forEach(tipo => {
    document.querySelectorAll(`input[name="${tipo}"]`)
      .forEach(r => r.checked = r.value === proyecto.evaluacion[tipo]);
  });

  document.querySelectorAll('input[type="checkbox"]')
    .forEach(c => c.checked = proyecto.evaluacion.pdca?.includes(c.value));
}

/* ===== VALORES ===== */
function setValor(tipo, valor) {
  if (!proyecto) return;
  proyecto.evaluacion[tipo] = valor;
  renderSemaforos();
}

/* ===== PDCA ===== */
function togglePDCA(checkbox) {
  if (!proyecto) return;

  if (!Array.isArray(proyecto.evaluacion.pdca)) {
    proyecto.evaluacion.pdca = [];
  }

  if (checkbox.checked) {
    proyecto.evaluacion.pdca.push(checkbox.value);
  } else {
    proyecto.evaluacion.pdca =
      proyecto.evaluacion.pdca.filter(v => v !== checkbox.value);
  }

  renderSemaforos();
}

/* ===== COLORES ===== */
function color(tipo, v) {
  if (!v || (Array.isArray(v) && v.length === 0)) return "#808080";

  if (tipo === "kpi") {
    if (v === "en_tiempo") return "#008000";
    if (v === "cumple") return "#90EE90";
    if (v === "mitigado") return "#FFD700";
    if (v === "retraso") return "#FF8C00";
    if (v === "programado") return "#FF0000";
  }

  if (tipo === "gantt") {
    if (v === "valor") return "#008000";
    if (v === "retraso") return "#FFD700";
    if (v === "r2") return "#FF8C00";
    if (v === "r3") return "#FF0000";
  }

  if (tipo === "pdca") {
    const n = v.length;
    if (n >= 5) return "#008000";
    if (n === 4) return "#90EE90";
    if (n === 3) return "#FFD700";
    if (n === 2) return "#FF8C00";
    return "#FF0000";
  }

  return "#808080";
}

/* ===== PORCENTAJES ===== */
function obtenerPorcentaje(tipo, v) {
  if (tipo === "kpi") {
    return { en_tiempo:100, cumple:90, mitigado:70, retraso:50, programado:30 }[v] || 0;
  }

  if (tipo === "gantt") {
    return { valor:100, retraso:70, r2:50, r3:30 }[v] || 0;
  }

  if (tipo === "pdca") {
    const n = v?.length || 0;
    return [0,20,40,60,80,100][n] || 0;
  }

  return 0;
}

/* ===== SEMAFOROS ===== */
function renderSemaforos() {
  if (!proyecto || !proyecto.evaluacion) return;

  document.getElementById("sem-kpi").style.background =
    color("kpi", proyecto.evaluacion.kpi);

  document.getElementById("sem-plan").style.background =
    color("gantt", proyecto.evaluacion.gantt);

  document.getElementById("sem-pdca").style.background =
    color("pdca", proyecto.evaluacion.pdca);

  document.getElementById("porc-kpi").innerText =
    obtenerPorcentaje("kpi", proyecto.evaluacion.kpi) + "%";

  document.getElementById("porc-gantt").innerText =
    obtenerPorcentaje("gantt", proyecto.evaluacion.gantt) + "%";

  document.getElementById("porc-pdca").innerText =
    obtenerPorcentaje("pdca", proyecto.evaluacion.pdca) + "%";
}
  await db.collection("historial").add({
    proyectoId,
    proyectoNombre: proyecto.nombre,
    usuario: UID,
    fecha: new Date(),
    antes: before.data().evaluacion,
    despues: proyecto.evaluacion
  });

  alert("Guardado ✅");
}

/* ===== EVENTOS ===== */
selectProyectoUser.onchange = () => {
  cargarProyecto(selectProyectoUser.value);
};

/* ===== INIT ===== */
aplicarRol();
cargarProyectos();
cargarSelect();

console.log("APP OK 🚀");
</script>

</body>
</html>
